<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS Interview Questions</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>📱 iOS Interview Questions & Answers</h1>

        <div class="qa-card">
            <div class="question">
                Q1. What is an Optional in Swift?
            </div>

            <div class="answer">
                Optional is a type that can contain a value or nil.
                It helps prevent unexpected crashes caused by null values.
            </div>
        </div>

        <div class="qa-card">
            <div class="question">
                Q2. What is the difference between Struct and Class?
            </div>

            <div class="answer">
                Structs are value types, while classes are reference types.
            </div>
        </div>

    </div>

</body>
